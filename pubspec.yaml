name: mealique
description: "Mealique - Your app for meal planning and recipes."
publish_to: 'none'
version: 1.0.1+7

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_secure_storage: ^10.3.0
  flutter_slidable: ^4.0.3

  # Networking
  dio: ^5.9.1

  # Navigation and routing
  go_router: ^17.2.3

  # Cached imaging
  cached_network_image: ^3.4.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Database (Drift & SQLite)
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0
  connectivity_plus: ^7.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  package_info_plus: ^10.1.0
  calendar_date_picker2: ^3.0.0
  url_launcher: ^6.3.2
  quick_actions_android: ^1.0.28

  # Background tasks and notifications
  workmanager: ^0.9.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  permission_handler: ^12.0.0

  # Camera and OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/mealique.png"
  web:
    generate: true
    image_path: "assets/mealique.png"
  windows:
    generate: true
    image_path: "assets/mealique.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/mealique.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/mealique.png
